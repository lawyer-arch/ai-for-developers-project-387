name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write


jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Debug write permissions
        run: |
            echo "Testing if token can create a PR..."
            RESPONSE=$(curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d '{
                "title": "test-pr-for-debug",
                "head": "non-existent-branch-for-testing",
                "base": "main"
            }' \
            -w "\nHTTP_STATUS:%{http_code}" \
            -s)
    
            echo "$RESPONSE"
            if echo "$RESPONSE" | grep -q "HTTP_STATUS:201"; then
              echo "✅ Token CAN create PRs"
            elif echo "$RESPONSE" | grep -q "HTTP_STATUS:403\|HTTP_STATUS:404"; then
              echo "❌ Token CANNOT create PRs"
            echo "Error details: $(echo "$RESPONSE" | grep -v HTTP_STATUS)"
            fi

      - uses: googleapis/release-please-action@v4
        with:
          token: ${{secrets.RELEASE_PLEASE_TOKEN }}
          release-type: simple