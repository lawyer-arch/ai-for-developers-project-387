name: Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Check account age
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const user = await github.rest.users.getByUsername({
              username: context.payload.issue.user.login
            });
            const created = new Date(user.data.created_at);
            const days = (Date.now() - created) / (1000 * 60 * 60 * 24);
            return days >= 30;
          result-encoding: string

      - uses: actions/checkout@v6
        if: steps.check.outputs.result == 'true'
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        if: steps.check.outputs.result == 'true'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/deepseek-v4-flash-free
          prompt: |
            Review this issue. If there's a clear fix or relevant docs:
            - Provide documentation links
            - Add error handling guidance for code examples
            Otherwise, do not comment.
            1.  ### Title Analysis:
            -   Check the issue title for clarity and conciseness.
            -   Does it clearly state the problem or the desired feature?
            -   If the title is vague (e.g., "Help", "Bug", "Error"), suggest a more specific alternative.

            2.  ### Body Analysis:
            -   Check the body of the issue for a clear description of the problem.
            -   Verify that all required information is present (e.g., steps to reproduce, expected vs actual behavior, environment details).
            -   If any information is missing, politely ask the user to provide it.

            3.  ### Code Snippet Syntax Check:
            -   If the issue contains code snippets, review them for basic syntax errors and typos.
            -   If you find an obvious syntax error, point it out and suggest a correction.

            Your response should be constructive and helpful. If you find no issues with the title, body, or code snippets, do not comment.