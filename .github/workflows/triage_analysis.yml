name: Issue Analysis

on:
  issues:
    types: [opened]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: none # <-- Агент не может создавать PR
      issues: write # <-- Может оставлять комментарии

    steps:
      - name: Check account age
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const user = await github.rest.users.getByUsername({
              username: context.payload.issue.user.login
            });
            const created = new Date(user.data.created_at);
            const days = (Date.now() - created) / (1000 * 60 * 60 * 24);
            return days >= 30;
          result-encoding: string

      - uses: actions/checkout@v6
        if: steps.check.outputs.result == 'true'
        with:
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        if: steps.check.outputs.result == 'true'
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/deepseek-v4-flash-free
          prompt: |
            You are a code reviewer for a new issue. Your task is to analyze the issue and provide constructive feedback.
            DO NOT ATTEMPT TO FIX THE CODE OR CREATE A PULL REQUEST.

            1. ### Title Analysis:
               - Check the issue title for clarity and conciseness.
               - If the title is vague (e.g., "Help", "Bug", "Error"), suggest a more specific alternative.

            2. ### Body Analysis:
               - Check if the body contains a clear description of the problem.
               - Verify that all required information is present (e.g., steps to reproduce, expected vs actual behavior).
               - If any information is missing, politely ask the user to provide it.

            3. ### Code Snippet Syntax Check:
               - If the issue contains code snippets, review them for basic syntax errors and typos.
               - If you find an obvious syntax error, point it out and suggest a correction.

            Your response should be a helpful comment. If you find no issues with the title, body, or code snippets, DO NOT COMMENT.